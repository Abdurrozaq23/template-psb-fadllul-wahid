<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSB Al-Falah - Masuk</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000000;
            color: #f8fafc;
        }
    </style>
</head>

<body
    class="min-h-screen flex flex-col items-center justify-center p-6 antialiased selection:bg-emerald-500 selection:text-white">

    <div class="w-full max-w-sm mx-auto flex flex-col gap-10">

        <!-- Branding -->
        <div class="flex flex-col items-center text-center space-y-4">
            <div
                class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                    </path>
                </svg>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white">PSB Al-Falah</h1>
                <p class="text-slate-400 text-sm mt-1">Sistem Pendaftaran Santri Baru</p>
            </div>
        </div>

        <!-- Login Card -->
        <div class="bg-slate-800/50 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-6 sm:p-8 shadow-2xl">
            <div class="mb-8">
                <h2 class="text-xl font-semibold text-white mb-2">Selamat Datang</h2>
                <p class="text-slate-400 text-sm leading-relaxed">Silakan masuk menggunakan akun Google Anda untuk
                    memulai atau melanjutkan pendaftaran.</p>
            </div>

            <button
                class="w-full flex items-center justify-center gap-4 bg-white hover:bg-slate-100 text-slate-800 py-3.5 px-4 rounded-xl font-semibold transition-colors active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 focus:ring-offset-slate-900 border border-transparent">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                Masuk dengan Google
            </button>

            <div class="mt-8 flex flex-col gap-4">
                <div class="bg-slate-800/80 rounded-xl p-4 flex items-start gap-4 border border-slate-700">
                    <div class="text-emerald-400 mt-0.5">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-slate-200">Biaya Administrasi</p>
                        <p class="text-sm font-bold text-emerald-400 mt-1">Rp 150.000</p>
                    </div>
                </div>
            </div>

        </div>

        <!-- Footer -->
        <div class="text-center space-y-2">
            <p class="text-xs text-slate-500">Dengan menekan tombol masuk, Anda menyetujui<br><a href="#"
                    class="text-emerald-400 hover:underline">Syarat & Ketentuan</a> Pendaftaran.</p>
        </div>

    </div>

</body>

</html>

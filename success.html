<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSB Fadllul Wahid - Pendaftaran Selesai</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #05050A;
            color: #f8fafc;
            overflow: hidden;
            /* Prevent scroll on success page for cinematic effect */
        }

        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at center, rgba(45, 212, 191, 0.15), transparent 60%);
            filter: blur(40px);
        }

        /* The Glowing Orb */
        .orb-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto;
        }

        .orb {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #5eead4, #4f46e5);
            box-shadow:
                0 0 40px 10px rgba(45, 212, 191, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 6s ease-in-out infinite;
            z-index: 10;
        }

        /* The ripples around the orb */
        .ripple {
            position: absolute;
            inset: -40px;
            border-radius: 50%;
            border: 1px solid rgba(45, 212, 191, 0.3);
            animation: ripple-anim 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            z-index: 1;
        }

        .ripple:nth-child(2) {
            animation-delay: 0.5s;
            inset: -80px;
        }

        .ripple:nth-child(3) {
            animation-delay: 1s;
            inset: -120px;
            border-color: rgba(79, 70, 229, 0.2);
        }

        @keyframes float {
            0% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(-15px) scale(1.02);
            }

            100% {
                transform: translateY(0px) scale(1);
            }
        }

        @keyframes ripple-anim {
            0% {
                transform: scale(0.6);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6 antialiased">

    <div class="mesh-bg"></div>

    <div class="w-full max-w-lg mx-auto text-center z-10">

        <!-- The Floating Orb -->
        <div class="orb-container mb-16">
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="orb">
                <svg class="w-16 h-16 text-[#05050A]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>

        <div class="relative z-10 space-y-3 mb-10">
            <h1 class="text-4xl sm:text-5xl font-extrabold text-white tracking-tight">Pendaftaran <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-indigo-400">Selesai!</span>
            </h1>
            <p class="text-slate-400 text-sm sm:text-base leading-relaxed max-w-sm mx-auto">Kami telah menerima dan
                menyimpan data lengkap calon santri <strong class="text-white">Ahmad Fauzi</strong>.</p>
        </div>

        <!-- Glass Information Panel -->
        <div
            class="glass-card p-2 sm:p-2 rounded-3xl mb-8 flex flex-col sm:flex-row shadow-2xl relative overflow-hidden">
            <!-- ID Badge -->
            <div
                class="bg-[#05050A] border border-white/5 rounded-2xl py-4 sm:py-6 px-6 flex-1 flex flex-col items-center justify-center relative overflow-hidden">
                <div class="absolute -right-10 -bottom-10 w-24 h-24 bg-teal-500/20 blur-xl rounded-full"></div>
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 relative z-10">Nomor
                    Registrasi</span>
                <span
                    class="font-mono font-bold text-teal-400 text-lg sm:text-xl tracking-widest relative z-10">REG-8192</span>
            </div>
            <!-- Next Step Info -->
            <div class="p-6 flex-1 text-left flex flex-col justify-center">
                <h4 class="text-sm font-bold text-white mb-2">Langkah Tersisa</h4>
                <p class="text-[11px] text-slate-400 leading-relaxed mb-4">Unduh PDF bermeterai, lalu bawa berkas fisik
                    ke agenda Tes Observasi offline.</p>
            </div>
        </div>

        <!-- Call to Action -->
        <div class="flex flex-col sm:flex-row gap-4 relative z-10">
            <a href="pdf_formulir.html"
                class="flex-1 bg-white text-[#05050A] font-bold py-4 rounded-2xl hover:bg-slate-200 transition-all flex items-center justify-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                <span>Unduh Berkas PDF</span>
            </a>
            <a href="dashboard.html"
                class="flex-1 border border-white/10 bg-white/5 hover:bg-white/10 text-white font-bold transition-colors py-4 rounded-2xl flex items-center justify-center">
                Ke Dashboard Santri
            </a>
        </div>

    </div>

</body>

</html>
